name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege: only read repository content.
# Individual steps that need extra access (e.g. upload-artifact) use their own
# scoped GITHUB_TOKEN implicitly; no write permissions are granted globally.
permissions:
  contents: read

# Cancel any in-flight run for the same workflow + ref so PRs don't queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: learnault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d learnault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/learnault_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      STELLAR_NETWORK: testnet

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node + pnpm (pinned to committed packageManager version) ────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      # --frozen-lockfile ensures the committed lockfile is the source of truth
      # and that no implicit lockfile mutations happen in CI.
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # ── Prisma gates ────────────────────────────────────────────────────────
      - name: Validate Prisma schema
        run: pnpm run db:validate

      - name: Check Prisma schema formatting
        run: pnpm run db:format:check

      - name: Generate Prisma client
        run: pnpm run db:generate

      # Deploy all committed migrations against the fresh empty test database.
      # This validates that the full migration history applies cleanly from scratch.
      - name: Apply migrations (empty-database validation)
        run: pnpm run db:migrate:deploy

      # ── Code-quality gates ──────────────────────────────────────────────────
      - name: Check formatting (Prettier)
        run: pnpm run format:check

      # --max-warnings 0 turns lint warnings into failures so style regressions
      # are caught early without silently accumulating.
      - name: Lint (ESLint)
        run: pnpm exec eslint . --max-warnings 0

      - name: Type-check
        run: pnpm run typecheck

      # ── Tests + coverage (single run) ───────────────────────────────────────
      # Run once with coverage so the suite isn't executed twice.
      # Coverage thresholds are enforced by vitest.config.js (lines/statements/
      # functions/branches ≥ 60 %).  A threshold breach exits non-zero.
      - name: Run tests with coverage
        run: pnpm run test:coverage

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm run build

      # ── Artifact upload ──────────────────────────────────────────────────────
      # Always upload so failures have downloadable evidence.
      # Coverage HTML report lets reviewers inspect uncovered paths without
      # re-running locally.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          if-no-files-found: ignore
